# yamllint disable rule:comments rule:line-length
---
name: CodeChecks
on:
  push:
    paths:
      - ".github/workflows/codeChecks.yml"
      - ".goreleaser.yaml"
      - ".golangci.yml"
      - ".testcoverage.yml"
      - "devenv.*"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "*.go"
      - "go.*"
  workflow_call:

permissions:
  contents: read

jobs:
  go_lint:
    name: Go lint
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        go-version: ["1.25"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  go_vulncheck:
    name: Go vulnerabilities check
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        go-version: ["1.25"]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: go mod tidy

      - name: govulncheck test
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: ${{ matrix.go-version }}
          go-package: ./...
          work-dir: .

  go_tests:
    name: Go tests and build
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        go-version: ["1.25"]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: go mod tidy

      - name: Test with the Go CLI
        run: go test ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

      - name: Build
        run: go build -v ./...

  go_test_coverage_check:
    needs: go_tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: generate test coverage
        run: go test ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

      - name: check test coverage
        continue-on-error: ${{ github.ref_name != 'main' }}
        uses: vladopajic/go-test-coverage@8cfd056d3bc5cc2bc64a840ded0c907aaae3dc46 # v2.18.7
        with:
          config: ./.testcoverage.yml
          git-token: ${{ github.ref_name == 'main' && secrets.GITHUB_TOKEN || '' }}
          git-branch: badges

